<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeWithMithun Navbar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* 🌍 RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:200vh;
    background:linear-gradient(270deg,#0a192f,#020c1b,#0a192f);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 🔥 NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    padding:14px 6%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter: blur(15px);
    background:rgba(0,0,40,0.6);
    border-bottom:1px solid rgba(0,234,255,0.2);
    z-index:999;
}

/* ✨ LOGO */
.logo{
    font-size:clamp(18px,2vw,26px);
    font-weight:700;
    color:#00eaff;
    position:relative;
    cursor:pointer;
}

/* 🔥 UNDERLINE ANIMATION */
.logo::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-6px;
    width:0%;
    height:3px;
    background:linear-gradient(90deg,#00eaff,#007bff);
    border-radius:10px;
    transition:0.4s ease;
}

/* hover (desktop) */
.logo:hover::after{
    width:100%;
}

/* tap effect (mobile) */
.logo:active::after{
    width:100%;
}

/* 📌 LINKS */
.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    position:relative;
    transition:0.3s;
}

.nav-links a::after{
    content:'';
    position:absolute;
    left:50%;
    bottom:-6px;
    width:0%;
    height:2px;
    background:#00eaff;
    transform:translateX(-50%);
    transition:0.4s;
}

.nav-links a:hover{
    color:#00eaff;
    text-shadow:0 0 10px #00eaff;
}

.nav-links a:hover::after{
    width:100%;
}

/* 💎 BUTTON */
.nav-btn{
    padding:9px 18px;
    border-radius:25px;
    border:none;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(90deg,#007bff,#00eaff);
    box-shadow:0 0 15px rgba(0,234,255,0.5);
    transition:0.3s;
}

.nav-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #00eaff;
}

/* RIGHT */
.right-section{
    display:flex;
    align-items:center;
    gap:15px;
}

/* ✨ COMBO BUTTON */
.combo-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(0,234,255,0.3);
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.combo-btn:hover{
    background:#00eaff;
    color:#000;
    box-shadow:0 0 20px #00eaff;
    transform:scale(1.08);
}

/* POPUP */
.popup-menu{
    position:absolute;
    top:70px;
    right:6%;
    display:flex;
    gap:10px;
    padding:14px;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border:1px solid rgba(0,234,255,0.2);
    opacity:0;
    visibility:hidden;
    transform:translateY(-20px) scale(0.8);
    transition:0.4s;
}

.popup-menu.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0) scale(1);
}

/* BUTTONS */
.btn{
    padding:8px 16px;
    border-radius:25px;
    border:none;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(90deg,#007bff,#00eaff);
    transition:0.3s;
    box-shadow:0 0 15px rgba(0,234,255,0.4);
}

.btn:hover{
    transform:translateY(-3px) scale(1.1);
    box-shadow:0 0 25px #00eaff;
}

/* 🍔 MOBILE */
.menu-toggle{
    display:none;
    color:#fff;
    font-size:22px;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        position:fixed;
        top:70px;
        left:-100%;
        width:100%;
        height:100vh;
        flex-direction:column;
        background:#020c1b;
        padding-top:40px;
        gap:25px;
        transition:0.5s;
    }

    .nav-links.active{
        left:0;
    }

    .popup-menu{
        right:10px;
        flex-direction:column;
    }
}

</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">CodeWithMithun</div>

    <div class="nav-links" id="navLinks">
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Projects</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button class="nav-btn">Get Started</button>
    </div>

    <div class="right-section">

        <div class="menu-toggle" id="menu">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="combo-btn" id="comboBtn">
            <i class="fas fa-user"></i>
            <i class="fas fa-bars" id="menuIcon"></i>
        </div>

    </div>

</nav>

<div class="popup-menu" id="popupMenu">
    <a href="login.html"><button class="btn">Login</button></a>
    <a href="join.html"><button class="btn">Join Us</button></a>
</div>

<script>

const menu = document.getElementById("menu");
const navLinks = document.getElementById("navLinks");

menu.addEventListener("click", ()=>{
    navLinks.classList.toggle("active");
});

const comboBtn = document.getElementById("comboBtn");
const menuIcon = document.getElementById("menuIcon");
const popupMenu = document.getElementById("popupMenu");

let isOpen=false;

comboBtn.addEventListener("click", ()=>{
    isOpen=!isOpen;

    if(isOpen){
        menuIcon.classList.replace("fa-bars","fa-xmark");
        popupMenu.classList.add("active");
    }else{
        menuIcon.classList.replace("fa-xmark","fa-bars");
        popupMenu.classList.remove("active");
    }
});

document.addEventListener("click",(e)=>{
    if(!comboBtn.contains(e.target) && !popupMenu.contains(e.target)){
        popupMenu.classList.remove("active");
        menuIcon.classList.replace("fa-xmark","fa-bars");
        isOpen=false;
    }
});

</script>

</body>
</html>
