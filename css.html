<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Design Course</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --bg:#f5f7ff;
    --text:#1f2933;
    --gradient: linear-gradient(135deg,#2563eb,#1e40af);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
}

/* WRAPPER */
.wrapper{
    max-width:1430px;   /* ✅ updated */
    margin:auto;
    padding:20px;
}

/* BACK */
.back a{
    text-decoration:none;
    color:var(--primary);
    font-weight:bold;
    display:inline-flex;
    align-items:center;
    gap:8px;
}
.back a:hover{
    color:var(--primary-dark);
}

/* HERO */
.hero{
    background:var(--gradient);
    color:white;
    text-align:center;
    padding:70px 20px;
    border-radius:22px;
    margin:20px 0 50px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
}

.hero i{
    font-size:40px;
    margin-bottom:10px;
}

.hero h1{
    font-size:2.5rem;
}

.hero p{
    margin-top:10px;
    opacity:0.9;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    transition:all 0.4s ease;
    display:flex;
    flex-direction:column;
    gap:12px;
    text-align:center;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    background:var(--gradient);
    color:white;
}

.card:hover i{
    color:white;
    transform:scale(1.3);
}

/* ICON */
.card i{
    font-size:36px;
    color:var(--primary);
    transition:0.4s;
}

/* BUTTON */
.btn{
    margin-top:auto;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:var(--primary-dark);
    transform:scale(1.1);
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h1{
        font-size:2rem;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="back">
    <a href="index.html">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
</div>

<div class="hero">
    <i class="fa-brands fa-css3-alt"></i>
    <h1>CSS Design</h1>
    <p>Learn CSS from Basics to Advanced UI Design</p>
</div>

<div class="container">

    <div class="card">
        <i class="fa-solid fa-paintbrush"></i>
        <h3>CSS Basics</h3>
        <p>Selectors, Colors, Fonts</p>
        <button class="btn">Learn</button>
    </div>

    <div class="card">
        <i class="fa-solid fa-box"></i>
        <h3>Box Model</h3>
        <p>Margin, Padding, Border</p>
        <button class="btn">Learn</button>
    </div>

    <div class="card">
        <i class="fa-solid fa-arrows-left-right"></i>
        <h3>Flexbox</h3>
        <p>Responsive Layout Design</p>
        <button class="btn">Learn</button>
    </div>

    <div class="card">
        <i class="fa-solid fa-border-all"></i>
        <h3>Grid</h3>
        <p>Advanced Layout System</p>
        <button class="btn">Learn</button>
    </div>

    <div class="card">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <h3>Animations</h3>
        <p>Transitions, Keyframes</p>
        <button class="btn">Learn</button>
    </div>

    <div class="card">
        <i class="fa-solid fa-rocket"></i>
        <h3>Projects</h3>
        <p>Build Modern UI Designs</p>
        <button class="btn">Start</button>
    </div>

</div>

</div>

</body>
</html>
