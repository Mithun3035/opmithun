<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* BODY */
body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1430px;
    display:flex;
    gap:25px;
}

/* LEFT (OLD STYLE) */
.left{
    flex:1;
    background:#007bff;
    color:#fff;
    padding:40px;
    border-radius:15px;
    animation:fadeIn 1s ease;
}

/* INFO */
.info{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    margin-bottom:10px;
    background:rgba(255,255,255,0.15);
    border-radius:8px;
    transition:0.3s;
}

.info:hover{
    transform:translateX(6px);
    background:rgba(255,255,255,0.3);
}

/* SOCIAL */
.socials a{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    background:#fff;
    color:#007bff;
    padding:10px 15px;
    margin:5px 5px 0 0;
    border-radius:25px;
    transition:0.3s;
}

/* HOVER */
.socials a:hover{
    background:#0056b3;
    color:#fff;
    transform:scale(1.1);
}

/* RIGHT */
.right{
    flex:1;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* INPUT */
input, textarea{
    width:100%;
    margin-bottom:15px;
    padding:12px;
    border:2px solid #007bff;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus, textarea:focus{
    box-shadow:0 0 10px rgba(0,123,255,0.4);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#007bff;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

/* POPUP */
.popup-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:90%;
    max-width:400px;
    animation:zoom 0.4s ease;
}

.popup-box i{
    font-size:40px;
    color:#007bff;
    margin-bottom:10px;
}

.popup-box a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    background:#007bff;
    color:#fff;
    padding:10px 20px;
    border-radius:25px;
    transition:0.3s;
}

.popup-box a:hover{
    background:#0056b3;
}

/* ANIMATION */
@keyframes zoom{
    from{transform:scale(0.5); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE (OLD STYLE) -->
    <div class="left">

        <h2>Contact Info</h2>

        <div class="info">
            <i class="fa-solid fa-location-dot"></i> Kolkata, India
        </div>

        <div class="info">
            <i class="fa-solid fa-phone"></i> +91 7295953892
        </div>

        <div class="info">
            <i class="fa-solid fa-envelope"></i> support@mithunkumar1656
        </div>

        <!-- SOCIAL -->
        <div class="socials">
            <h3>Connect</h3>

            <a href="https://wa.me/917295953892" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>

            <a href="https://www.instagram.com/mith_un_ry?igsh=czU2bjh4NW5wOWRm target="_blank">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>

            <a href="mailto:support@mithunkumar1656.com">
                <i class="fa-solid fa-envelope"></i> Email
            </a>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <h2 style="color:#007bff;">Send Message</h2>

        <form id="contactForm">

            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Subject" required>
            <textarea rows="4" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup-overlay">
    <div class="popup-box">
        <i class="fa-solid fa-circle-check"></i>
        <h3>Thank You!</h3>
        <p>
            Thank you for contacting us.<br>
            We will reply within <b>48 hours</b>.
        </p>

        <a href="contact.html">⬅ Back to Page</a>
    </div>
</div>

<script>

/* SHOW POPUP */
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("popup").style.display = "flex";

    this.reset();
});

</script>

</body>
</html>
